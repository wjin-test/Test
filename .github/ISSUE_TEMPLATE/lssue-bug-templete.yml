name: '🐛 Bug'
description: '버그 리포트'
title: '[BUG] <title> '
labels: ['bug']
body:
  - type: textarea
    attributes:
      label: 📄 버그 설명
      description: 어떤 버그인지 설명해주세요.
      placeholder:
    validations:
      required: true
  - type: textarea
    attributes:
      label: ‼️ 어떤 상황에서 발생한 버그인가요 ?
      description: 해당 버그가 나타난 과정을 작성해주세요.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🔥 예상 결과
      description: 예상했던 정상적인 결과가 어떤 것인지 적어주세요 !
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🙋🏻 참고 자료
      description: 기타 참고할 만한 정보나 로그 등이 있다면 작성 해주세요.
  - type: textarea
    attributes:
      label: 🖼️ 스크린샷
      description: 가능하다면 문제를 보여주는 이미지를 첨부해주세요.
